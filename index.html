<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO Meta Tags -->
    <title>RenovatePro – Premium Home Renovation Services in India</title>
    <meta name="description" content="India's most trusted home renovation company. Transform your kitchen, bathroom, bedroom, and living room with our expert team. Free consultation available." />
    <meta name="keywords" content="home renovation, interior design, kitchen renovation, bathroom renovation, bedroom design, living room, India, Bangalore, Hyderabad, Mumbai" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:title" content="RenovatePro – Premium Home Renovation" />
    <meta property="og:description" content="Transform your dream home into reality with India's #1 renovation experts." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://renovatepro.in" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RenovatePro – Premium Home Renovation" />
    <meta name="twitter:description" content="1,240+ projects completed. Get your free consultation today." />
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <!-- Canonical -->
    <link rel="canonical" href="https://renovatepro.in" />
    <!-- Dark mode init: prevent flash -->
    <script>
      (function(){
        const t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
